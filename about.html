<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>
<style>
  :root {
    --bg: #f6f7f5;
    --surface: #ffffff;
    --ink: #1e2a2b;
    --ink-soft: #5b6866;
    --line: #dfe4e0;
    --accent: #2f7a73;
    --accent-soft: #e4f0ee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
  }
  .home-link {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 24px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px 0;
  }
  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .intro {
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .contact {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-soft);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .contact .icon { font-size: 16px; }
  .contact a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="home-link">‹ Home</a>
    <div class="card">
      <h1>James Shin</h1>
      <div class="subtitle">About</div>

      <div class="section-label">Introduction</div>
      <div class="intro">
        Extensive experience across various fields of IT.
        Currently interested in the new Vibe Coding approach,
        and using it to build practical tools that make work
        more convenient at the company.
      </div>

      <div class="section-label">Contact</div>
      <div class="contact">
        <span class="icon">✉️</span>
        <a href="mailto:jamesshin@gmail.com">jamesshin@gmail.com</a>
      </div>
    </div>
  </div>
</body>
</html>
